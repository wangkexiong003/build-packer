name: Build vagrant images with qemu provider
on:
  push:
  workflow_dispatch:
  workflow_call:

env:
  PACKER_GITHUB_API_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

jobs:
  x86_64:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - archlinux
          - ubuntu-24.04
          - ubuntu-26.04
        provider:
          - qemu
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Install Vagrant QEMU
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update
          sudo apt-get install -y software-properties-common vagrant qemu-kvm libvirt-daemon-system virtinst libvirt-clients bridge-utils qemu-utils libvirt-dev ovmf
          vagrant plugin install vagrant-libvirt vagrant-qemu
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo usermod -aG kvm $USER
          sudo usermod -aG libvirt $USER
          sudo chmod o+rw /var/run/libvirt/libvirt-sock
          sudo systemctl start libvirtd
          sudo systemctl status libvirtd
      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest
      - name: Packer Init
        run: packer init -upgrade packer_templates
      - name: Packer Build
        shell: pwsh
        continue-on-error: true
        env:
          HCP_CLIENT_ID: ${{ secrets.HCP_CLIENT_ID }}
          HCP_CLIENT_SECRET: ${{ secrets.HCP_CLIENT_SECRET }}
        run: |
          $provider = "${{ matrix.provider }}.vm"
          $varFile = "os_pkrvars/$("${{ matrix.os }}".Split('-')[0])/${{ matrix.os }}-x86_64.pkrvars.hcl"
          packer build -timestamp-ui -force -only="$provider" -var-file="$varFile" packer_templates
